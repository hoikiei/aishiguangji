<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食光机 - 想吃点什么？</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        button, input, div, span, p, h1, h2, h3 {
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }

        .console-body {
            width: 380px;
            height: 700px;
            background: linear-gradient(145deg, #00c3e3 0%, #00a8c6 50%, #0089a8 100%);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 2px 10px rgba(255,255,255,0.3),
                inset 0 -5px 20px rgba(0,0,0,0.2);
            position: relative;
            border: 4px solid #007a94;
        }
        
        .screen-bezel {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            border: 3px solid #333;
        }
        
        .screen {
            background: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4/3;
        }
        
        /* 像素时钟 HUD */
        .pixel-clock {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 10px;
            border: 2px solid #fff;
            text-shadow: 1px 1px 0 #000;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .time-icon {
            font-size: 10px;
        }
        
        /* 时段指示器 */
        .period-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 10px;
            border: 2px solid #fff;
            text-shadow: 1px 1px 0 #000;
            z-index: 10;
            animation: pulse 2s infinite;
        }
        
        /* ===== 修改1: 标题8-bit像素加粗 ===== */
        .title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #87A890;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: all 0.6s ease;
        }
        
        .title-screen.hidden {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }
        
        .title-text {
            font-size: 32px;
            color: #10120d;
            font-weight: 900;
            letter-spacing: 4px;
            -webkit-text-stroke: 0.5px #fff;
            text-shadow: 
                2px 0 0 #10120d,
                0 -2px 0 #10120d;
            animation: titlePulse 1.5s ease-in-out infinite;
            margin: 0;                /* 清除外边距，确保垂直居中准确 */
            text-align: center;      /* 水平居中（如果父容器 flex 已经处理，可省略但保留无妨） */
            white-space: nowrap;     /* 强制不换行，保证 “SHI GUANG JI” 在一行 */
        }
        
        .title-text div {
            display: block;      /* 确保块级 */
            margin: 2px 0;      /* 上间距16px，下间距16px，可调整 */
            line-height: 1.2;    /* 行高，影响内部文字高度，但不是主要 */
        }
        
        .title-hint {
            font-size: 12px;
            color: #162916;
            margin-top: 30px;
            animation: blink 1s infinite;
        }
        
        .slot-machine {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #87CEEB 100%);
        }
        
        .slot-machine.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .cloud {
            position: absolute;
            opacity: 0.6;
            animation: float 20s infinite linear;
        }
        
        .cloud1 { top: 20%; left: -50px; animation-duration: 25s; }
        .cloud2 { top: 60%; right: -30px; animation-duration: 30s; animation-direction: reverse; }
        .cloud3 { top: 80%; left: -50px; animation-duration: 35s; }
        .cloud4 { top: 30%; right: -50px; animation-duration: 28s; }

        @keyframes float {
            from { transform: translateX(0); }
            to { transform: translateX(400px); }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .food-display {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
            border: 6px solid #654321;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.5),
                0 10px 30px rgba(0,0,0,0.3);
        }
        
        .food-display::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 10px;
            background: #FFD700;
            border: 3px solid #B8860B;
            border-radius: 4px;
        }
        
        .food-emoji {
            font-size: 80px;
            filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.3));
            animation: bounce 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-10px) scale(1.1); }
        }
        
        .food-name {
            margin-top: 15px;
            font-size: 12px;
            color: #fff;
            text-align: center;
            text-shadow: 3px 3px 0 #000;
            line-height: 1.4;
            padding: 0 10px;
        }
        
        .rolling .food-emoji {
            animation: rollBlur 0.1s linear infinite;
            filter: blur(2px);
        }
        
        @keyframes rollFast {
            0% { transform: translateY(-20px) scale(0.8); opacity: 0.5; }
            50% { transform: translateY(0) scale(1.2); opacity: 1; }
            100% { transform: translateY(20px) scale(0.8); opacity: 0.5; }
        }
        
        /* ===== 修改3: 结果弹窗缩小 ===== */
        .result-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .result-box {
            background: linear-gradient(145deg, #ff6b6b 0%, #ee5a6f 100%);
            border: 4px solid #fff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 240px;
            transform: scale(0.9);
        }
        
        .result-title {
            font-size: 12px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #c44569;
        }
        
        .result-food {
            font-size: 48px;
            margin: 10px 0;
            filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.3));
        }
        
        .result-text {
            font-size: 12px;
            color: #fff;
            text-shadow: 2px 2px 0 #c44569;
            margin: 8px 0 15px;
        }
        
        .result-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .result-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .result-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 rgba(0,0,0,0.3);
        }
        
        .btn-again {
            background: #fff;
            color: #ff6b6b;
        }
        
        .btn-ai {
            background: linear-gradient(145deg, #a29bfe 0%, #6c5ce7 100%);
            color: #fff;
            border: 2px solid #fff;
        }
        
        .ai-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 110;
        }
        
        .ai-box {
            background: linear-gradient(145deg, #2d3436 0%, #1a1a2e 100%);
            border: 4px solid #a29bfe;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 300px;
            width: 90%;
        }
        
        .ai-title {
            font-size: 14px;
            color: #a29bfe;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        
        .ai-hint {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }
        
        .ai-input {
            width: 100%;
            padding: 12px;
            border: 3px solid #a29bfe;
            border-radius: 6px;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .ai-input::placeholder {
            color: #888;
        }
        
        .ai-generate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(145deg, #00b894 0%, #00a085 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #008f75;
            margin-bottom: 15px;
        }
        
        .ai-generate-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #008f75;
        }
        
        .ai-generate-btn:disabled {
            background: #636e72;
            box-shadow: 0 4px 0 #2d3436;
            cursor: not-allowed;
        }
        
        .ai-loading {
            font-size: 10px;
            color: #a29bfe;
            margin: 10px 0;
            display: none;
        }
        
        .ai-recommendations {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .ai-rec-item {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        
        .ai-rec-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 11px;
        }
        
        .ai-rec-emoji {
            font-size: 24px;
        }
        
        .ai-add-btn {
            padding: 6px 12px;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 0 3px 0 #c44569;
        }
        
        .ai-add-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #c44569;
        }
        
        .ai-close-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
        }
        
        .ai-error {
            font-size: 10px;
            color: #ff6b6b;
            margin: 10px 0;
            display: none;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .d-pad {
            width: 120px;
            height: 120px;
            position: relative;
            opacity: 0.3;
        }
        
        .d-pad::before,
        .d-pad::after {
            content: '';
            position: absolute;
            background: #333;
            border-radius: 4px;
        }
        
        .d-pad::before {
            width: 40px;
            height: 120px;
            left: 40px;
            top: 0;
        }
        
        .d-pad::after {
            width: 120px;
            height: 40px;
            left: 0;
            top: 40px;
        }
        
        .action-buttons {
            display: flex;
            gap: 30px;
            align-items: flex-end;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .btn-label {
            color: #fff;
            font-size: 12px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }
        
        .game-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 
                0 6px 0 rgba(0,0,0,0.3),
                inset 0 -5px 10px rgba(0,0,0,0.2),
                inset 0 5px 10px rgba(255,255,255,0.3);
            transition: all 0.1s;
        }
        
        .game-btn:active {
            transform: translateY(6px);
            box-shadow: 
                0 0 0 rgba(0,0,0,0.3),
                inset 0 -5px 10px rgba(0,0,0,0.2),
                inset 0 5px 10px rgba(255,255,255,0.3);
        }
        
        .btn-a {
            background: linear-gradient(145deg, #ff6b6b 0%, #ee5a6f 100%);
            color: #fff;
        }
        
        .btn-b {
            background: linear-gradient(145deg, #feca57 0%, #ff9f43 100%);
            color: #333;
            width: 60px;
            height: 60px;
            font-size: 14px;
        }
        
        .settings-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #74b9ff 0%, #0984e3 100%);
            border: 3px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .settings-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.3);
        }
        
        .volume-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #a29bfe 0%, #6c5ce7 100%);
            border: 3px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .volume-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.3);
        }
        
        .volume-btn.muted {
            background: linear-gradient(145deg, #636e72 0%, #2d3436 100%);
        }
        
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 20px;
            border-radius: 26px;
        }
        
        .settings-header {
            color: #fff;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #ff6b6b;
            padding: 10px;
            border-bottom: 4px dashed #ff6b6b;
        }
        
        .food-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
        }
        
        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 8px;
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .food-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 10px;
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 0 3px 0 #c44569;
        }
        
        .delete-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #c44569;
        }
        
        .add-food-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .food-input {
            flex: 1;
            padding: 12px;
            border: 3px solid #ff6b6b;
            border-radius: 6px;
            font-size: 10px;
            background: #2d2d2d;
            color: #fff;
        }
        
        .food-input::placeholder {
            color: #888;
        }
        
        .add-btn {
            padding: 12px 20px;
            background: #00b894;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #00a085;
        }
        
        .add-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #00a085;
        }
        
        .period-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .period-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .period-btn.active {
            background: #ff6b6b;
            border-color: #fff;
        }
        
        .close-settings {
            padding: 15px;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c44569;
        }
        
        .close-settings:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #c44569;
        }
        
        .food-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .food-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        
        .food-list::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 4px;
        }
        
        .hint-text {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            font-size: 10px;
            text-align: center;
            animation: blink 1.5s infinite;
        }
        
        @media (max-height: 800px) {
            .console-body {
                transform: scale(0.9);
            }
        }
        
        @media (max-height: 700px) {
            .console-body {
                transform: scale(0.85);
            }
        }
    </style>
</head>
<body>
    <div class="console-body">
        <div class="screen-bezel">
            <div class="screen">
                <div class="title-screen" id="titleScreen">
                    <div class="title-text">    <div>SHI</div>
                                                              <div>GUANG</div>
                                                              <div>JI</div></div>

                    <div class="title-hint">PRESS A TO START</div>
                </div>
                
                <div class="slot-machine" id="slotMachine">
                    <div class="cloud cloud1">☁️</div>
                    <div class="cloud cloud2">☁️</div>
                    <div class="cloud cloud3">☁️</div>
                    <div class="cloud cloud4">☁️</div>
                    
                    <div class="period-badge" id="periodBadge">🌅 早餐时间</div>

                    <!-- 像素时钟 -->
                    <div class="pixel-clock">
                        <span class="time-icon">🕐</span>
                        <span id="clock">07:00</span>
                    </div>

                    
                    <div class="food-display" id="foodDisplay">
                        <div class="food-emoji" id="foodEmoji">🍳</div>
                        <div class="food-name" id="foodName">准备开始</div>
                    </div>
                </div>
                
                <div class="result-modal" id="resultModal">
                    <div class="result-box">
                        <div class="result-title">🎉</div>
                        <div class="result-food" id="resultEmoji">🍜</div>
                        <div class="result-text" id="resultText">拉面</div>
                        <div class="result-buttons">
                            <button class="result-btn btn-again" onclick="closeResultAndRoll()">
                                <span>🎰</span> 再抽一次 (A)
                            </button>
                            <button class="result-btn btn-ai" onclick="openAIRecommend()">
                                <span>🤖</span> AI推荐 (B)
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="ai-modal" id="aiModal">
                    <div class="ai-box">
                        <div class="ai-title">AI大师推荐</div>
                        <div class="ai-hint">想吃什么口味？（如：辣、清淡、甜）</div>
                        <input type="text" class="ai-input" id="aiInput" placeholder="输入口味..." maxlength="20">
                        <button class="ai-generate-btn" id="aiGenerateBtn" onclick="generateAIRecommendations()">
                            ✨ 生成推荐
                        </button>
                        <div class="ai-loading" id="aiLoading">AI大师思考中...</div>
                        <div class="ai-error" id="aiError"></div>
                        <button class="ai-close-btn" onclick="closeAIModal()">返回 (B)</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="d-pad"></div>
            <div class="action-buttons">
                <div class="btn-group">
                    <button class="game-btn btn-b" onclick="handleBButton()" id="btnB">B</button>
                    <span class="btn-label">设置</span>
                </div>
                <div class="btn-group">
                    <button class="game-btn btn-a" onclick="handleAButton()" id="btnA">A</button>
                    <span class="btn-label">开始</span>
                </div>
            </div>
        </div>
        
        <div class="hint-text" id="hintText">按 A 键即可开始^_^</div>
        
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
        <button class="volume-btn" id="volumeBtn" onclick="toggleVolume()">🔊</button>
        
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">⚙️ 食物背包</div>
            <div class="period-selector">
                <button class="period-btn active" onclick="switchPeriod('morning')" data-period="morning">🌅 早餐</button>
                <button class="period-btn" onclick="switchPeriod('lunch')" data-period="lunch">☀️ 午餐</button>
                <button class="period-btn" onclick="switchPeriod('dinner')" data-period="dinner">🌆 晚餐</button>
                <button class="period-btn" onclick="switchPeriod('night')" data-period="night">🌙 夜宵</button>
            </div>
            <div class="add-food-section">
                <input type="text" class="food-input" id="newFoodInput" placeholder="输入食物名称..." maxlength="10">
                <button class="add-btn" onclick="addFood()">+ 添加</button>
            </div>
            <div class="food-list" id="foodList"></div>
            <button class="close-settings" onclick="closeSettings()">返回游戏 (B)</button>
        </div>
    </div>

    <script>
        const defaultFoods = {
            morning: [
                { emoji: '🥟', name: '小笼包' }, { emoji: '🥣', name: '豆浆油条' },
                { emoji: '🍳', name: '煎蛋三明治' }, { emoji: '🥪', name: '全麦吐司' },
                { emoji: '🥛', name: '牛奶麦片' }, { emoji: '🥞', name: '松饼' },
                { emoji: '🍜', name: '清汤面' }, { emoji: '🥚', name: '茶叶蛋' },
                { emoji: '🌮', name: '鸡蛋灌饼' }, { emoji: '🥯', name: '贝果' },
                { emoji: '🍙', name: '饭团' }, { emoji: '🥣', name: '皮蛋瘦肉粥' },
                { emoji: '🍞', name: '菠萝包' }, { emoji: '🥟', name: '蒸饺' },
                { emoji: '🍰', name: '蛋糕卷' }
            ],
            lunch: [
                { emoji: '🍱', name: '日式便当' }, { emoji: '🍜', name: '牛肉面' },
                { emoji: '🍛', name: '咖喱饭' }, { emoji: '🥗', name: '鸡胸肉沙拉' },
                { emoji: '🍔', name: '汉堡套餐' }, { emoji: '🍕', name: '披萨' },
                { emoji: '🥘', name: '麻辣烫' }, { emoji: '🍝', name: '意大利面' },
                { emoji: '🍚', name: '盖浇饭' }, { emoji: '🥡', name: '中式快餐' },
                { emoji: '🌯', name: '鸡肉卷' }, { emoji: '🍲', name: '砂锅米线' },
                { emoji: '🥙', name: '肉夹馍' }, { emoji: '🍣', name: '寿司' },
                { emoji: '🥪', name: '潜艇堡' }
            ],
            dinner: [
                { emoji: '🍲', name: '火锅' }, { emoji: '🥘', name: '麻辣香锅' },
                { emoji: '🍖', name: '烤肉' }, { emoji: '🦐', name: '海鲜大餐' },
                { emoji: '🥩', name: '牛排' }, { emoji: '🍗', name: '烤鸡' },
                { emoji: '🥟', name: '饺子宴' }, { emoji: '🍜', name: '拉面' },
                { emoji: '🥡', name: '炒菜' }, { emoji: '🍛', name: '煲仔饭' },
                { emoji: '🥘', name: '酸菜鱼' }, { emoji: '🍢', name: '烧烤' },
                { emoji: '🥗', name: '轻食' }, { emoji: '🍝', name: '意面' },
                { emoji: '🥙', name: '土耳其烤肉' }
            ],
            night: [
                { emoji: '🍜', name: '泡面' }, { emoji: '🥟', name: '夜宵馄饨' },
                { emoji: '🍢', name: '关东煮' }, { emoji: '🥡', name: '炒饭' },
                { emoji: '🍕', name: '披萨' }, { emoji: '🍔', name: '汉堡' },
                { emoji: '🌭', name: '热狗' }, { emoji: '🥪', name: '三明治' },
                { emoji: '🍟', name: '薯条' }, { emoji: '🥚', name: '茶叶蛋' },
                { emoji: '🍜', name: '酸辣粉' }, { emoji: '🥡', name: '炒面' },
                { emoji: '🍢', name: '烤串' }, { emoji: '🥛', name: '牛奶燕麦' },
                { emoji: '🍰', name: '蛋糕' }
            ]
        };
        
        let foods = JSON.parse(localStorage.getItem('pixelFoods')) || JSON.parse(JSON.stringify(defaultFoods));
        let currentPeriod = 'morning';
        let isRolling = false;
        let currentFood = null;
        let gameState = 'title';
        let audioContext = null;
        let isMuted = false;
        let bgmOscillator = null;
        
        
        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            determinePeriod();
            updateDisplay();
            initAudio();
            setupKeyboardControls();
        }
        
        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyA' || e.code === 'Space') {
                    e.preventDefault();
                    handleAButton();
                } else if (e.code === 'KeyB' || e.code === 'Escape') {
                    e.preventDefault();
                    handleBButton();
                }
            });
        }
        
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log('Audio not supported');
            }
        }
        
        function playSound(type) {
            if (!audioContext || isMuted) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            const now = audioContext.currentTime;
            
            if (type === 'start') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'roll') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.08);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'stop') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                osc.frequency.setValueAtTime(783.99, now + 0.2);
                osc.frequency.setValueAtTime(1046.50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            }
        }
        
        function startBGM() {
            if (!audioContext || isMuted || bgmOscillator) return;
            const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63];
            let noteIndex = 0;
            
            function playNextNote() {
                if (!bgmOscillator || isMuted) return;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'triangle';
                osc.frequency.value = notes[noteIndex];
                gain.gain.value = 0.05;
                osc.start();
                osc.stop(audioContext.currentTime + 0.2);
                noteIndex = (noteIndex + 1) % notes.length;
                setTimeout(playNextNote, 250);
            }
            
            bgmOscillator = true;
            playNextNote();
        }
        
        function stopBGM() {
            bgmOscillator = false;
        }
        
        function toggleVolume() {
            isMuted = !isMuted;
            const btn = document.getElementById('volumeBtn');
            if (isMuted) {
                btn.textContent = '🔇';
                btn.classList.add('muted');
                stopBGM();
            } else {
                btn.textContent = '🔊';
                btn.classList.remove('muted');
                startBGM();
            }
            playSound('click');
        }
        
        function handleAButton() {
            if (gameState === 'title') {
                startGame();
            } else if (gameState === 'game') {
                startRoll();
            } else if (gameState === 'result') {
                closeResultAndRoll();
            }
        }
        
        function handleBButton() {
            if (gameState === 'game') {
                openSettings();
            } else if (gameState === 'result') {
                openAIRecommend();
            } else if (gameState === 'ai') {
                closeAIModal();
            } else if (gameState === 'title') {
                startGame();
            }
        }
        
        function startGame() {
            playSound('start');
            document.getElementById('titleScreen').classList.add('hidden');
            document.getElementById('slotMachine').classList.add('active');
            document.getElementById('hintText').textContent = '按 A 键即可开始^_^';
            gameState = 'game';
            
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            if (!isMuted && !bgmOscillator) {
                startBGM();
            }
        }
        
        function startRoll() {
            if (isRolling || gameState !== 'game') return;
            
            isRolling = true;
            const display = document.getElementById('foodDisplay');
            const emojiEl = document.getElementById('foodEmoji');
            const nameEl = document.getElementById('foodName');
            const periodFoods = foods[currentPeriod];
            
            display.classList.add('rolling');
            
            let rollCount = 0;
            const maxRolls = 25;
            let currentInterval = 50;
            
            function roll() {
                const randomFood = periodFoods[Math.floor(Math.random() * periodFoods.length)];
                emojiEl.textContent = randomFood.emoji;
                nameEl.textContent = randomFood.name;
                playSound('roll');
                
                rollCount++;
                if (rollCount >= maxRolls) {
                    finalizeRoll();
                    return;
                }
                
                if (rollCount < 10) currentInterval = 50;
                else if (rollCount < 15) currentInterval = 80;
                else if (rollCount < 20) currentInterval = 120;
                else currentInterval = 180;
                
                setTimeout(roll, currentInterval);
            }
            
            roll();
        }
        
        function finalizeRoll() {
            const periodFoods = foods[currentPeriod];
            currentFood = periodFoods[Math.floor(Math.random() * periodFoods.length)];
            
            document.getElementById('foodDisplay').classList.remove('rolling');
            document.getElementById('foodEmoji').textContent = currentFood.emoji;
            document.getElementById('foodName').textContent = currentFood.name;
            
            playSound('stop');
            
            setTimeout(() => {
                showResult();
                isRolling = false;
            }, 500);
        }
        
        function showResult() {
            document.getElementById('resultEmoji').textContent = currentFood.emoji;
            document.getElementById('resultText').textContent = currentFood.name;
            document.getElementById('resultModal').style.display = 'flex';
            document.getElementById('hintText').textContent = '按 B 键开始 AI 生成^_^';
            gameState = 'result';
        }
        
        function closeResultAndRoll() {
            document.getElementById('resultModal').style.display = 'none';
            playSound('click');
            gameState = 'game';
            document.getElementById('hintText').textContent = '按 A 键即可开始^_^';
            setTimeout(startRoll, 300);
        }
        
        function openAIRecommend() {
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('aiModal').style.display = 'flex';
            document.getElementById('aiInput').value = '';
            document.getElementById('aiLoading').style.display = 'none';
            document.getElementById('aiError').style.display = 'none';
            document.getElementById('aiGenerateBtn').disabled = false;
            gameState = 'ai';
            playSound('click');
        }
        
        function closeAIModal() {
            document.getElementById('aiModal').style.display = 'none';
            playSound('click');
            if (currentFood) {
                document.getElementById('resultModal').style.display = 'flex';
                gameState = 'result';
            } else {
                gameState = 'game';
                document.getElementById('hintText').textContent = '按 A 键即可开始^_^';
            }
        }
        
        // ===== 修改2: AI只推荐1个，直接使用 =====

        // ===== 修改：使用腾讯云函数代理 DeepSeek API =====
        const CLOUD_FUNCTION_URL = 'https://1420216921-1v8ujc74r7.ap-guangzhou.tencentscf.com';

        async function generateAIRecommendations() {
            const input = document.getElementById('aiInput').value.trim();
            if (!input) {
                showAIError('请输入口味偏好');
                return;
            }
    
            const btn = document.getElementById('aiGenerateBtn');
            const loading = document.getElementById('aiLoading');
            const errorDiv = document.getElementById('aiError');
    
            btn.disabled = true;
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
    
            try {
                // 获取当前时段的中文名称
                const periodNames = { morning: '早餐', lunch: '午餐', dinner: '晚餐', night: '夜宵' };
                const periodChinese = periodNames[currentPeriod];
        
                // 构造发送给 DeepSeek 的 prompt，要求返回 JSON 格式
                const prompt = `你是一个美食推荐助手。用户想吃${periodChinese}，口味偏好：${input}。请推荐1个菜品，返回严格JSON格式：{"emoji": "🍜", "name": "菜品名称"}。只返回JSON，不要有其他文字。`;
        
                // 调用云函数
                const response = await fetch(CLOUD_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: prompt })
                });
        
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
        
                const data = await response.json();
                // 云函数返回的数据结构可能是 { result: "..." } 或直接是 DeepSeek 的响应
                // 根据你的云函数实际返回格式调整，这里假设云函数返回 { result: "{\"emoji\":\"🍜\",\"name\":\"牛肉面\"}" }
                let aiText = '';
                if (data.result) {
                    aiText = data.result;
                } else if (data.choices && data.choices[0] && data.choices[0].message) {
                    // 如果云函数直接透传了 DeepSeek 的原始响应
                    aiText = data.choices[0].message.content;
                } else {
                    aiText = JSON.stringify(data);
                }
        
                // 解析 JSON
                let recommendation = null;
                try {
                    // 尝试提取 JSON 部分（防止前后有额外文字）
                    const jsonMatch = aiText.match(/\{.*\}/s);
                    if (jsonMatch) {
                        recommendation = JSON.parse(jsonMatch[0]);
                    }
                } catch (e) {
                    console.warn('JSON解析失败', e);
                }
        
                // 如果解析失败或缺少必要字段，使用备用推荐
                if (!recommendation || !recommendation.emoji || !recommendation.name) {
                    throw new Error('AI返回格式不正确');
                }
        
                // 直接使用 AI 推荐结果
                addAIAndRoll(recommendation.emoji, recommendation.name);
        
            } catch (error) {
                console.error('AI调用失败:', error);
                showAIError('AI服务暂时不可用，使用智能备用推荐');
        
                // 备用推荐（保留你原来的 generateBackupRecommendation 函数）
                const backup = generateBackupRecommendation(input);
                addAIAndRoll(backup.emoji, backup.name);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        // 备用推荐函数（你原来的代码，保持不变）
        

        function generateBackupRecommendation(input) {
            const keywords = {
                '辣': { emoji: '🌶️', name: '麻辣香锅' },
                '清淡': { emoji: '🥗', name: '蔬菜沙拉' },
                '甜': { emoji: '🍰', name: '蛋糕' },
                '日式': { emoji: '🍱', name: '日式便当' },
                '肉': { emoji: '🥩', name: '牛排' }
            };
            
            for (const [key, value] of Object.entries(keywords)) {
                if (input.includes(key)) return value;
            }
            
            return { emoji: '🍜', name: '特色拉面' };
        }
        
        function showAIError(msg) {
            const errorDiv = document.getElementById('aiError');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }
        
        function addAIAndRoll(emoji, name) {
            foods[currentPeriod].push({ emoji, name });
            saveFoods();
            
            document.getElementById('aiModal').style.display = 'none';
            playSound('click');
            
            gameState = 'game';
            currentFood = { emoji, name };
            
            document.getElementById('foodEmoji').textContent = emoji;
            document.getElementById('foodName').textContent = name;
            playSound('stop');
            
            setTimeout(() => {
                document.getElementById('resultEmoji').textContent = emoji;
                document.getElementById('resultText').textContent = name;
                document.getElementById('resultModal').style.display = 'flex';
                document.getElementById('hintText').textContent = 'AI大师倾情推荐';
                gameState = 'result';
            }, 500);
        }
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        
        // 时段判断
        function determinePeriod() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 10) {
                currentPeriod = 'morning';
            } else if (hour >= 10 && hour < 14) {
                currentPeriod = 'lunch';
            } else if (hour >= 14 && hour < 21) {
                currentPeriod = 'dinner';
            } else {
                currentPeriod = 'night';
            }
            updatePeriodBadge();
        }
        
        function updatePeriodBadge() {
            const badge = document.getElementById('periodBadge');
            const periods = {
                morning: { text: '🌅 早餐时间', class: 'period-morning' },
                lunch: { text: '☀️ 午餐时间', class: 'period-lunch' },
                dinner: { text: '🌆 晚餐时间', class: 'period-dinner' },
                night: { text: '🌙 夜宵时间', class: 'period-night' }
            };
            
            badge.textContent = periods[currentPeriod].text;
            badge.className = 'period-badge ' + periods[currentPeriod].class;
        }
        
        function updateDisplay() {
            if (!currentFood) {
                currentFood = foods[currentPeriod][0];
            }
            document.getElementById('foodEmoji').textContent = currentFood.emoji;
            document.getElementById('foodName').textContent = currentFood.name;
        }
        
        function openSettings() {
            if (isRolling) return;
            playSound('click');
            document.getElementById('settingsPanel').style.display = 'flex';
            renderFoodList();
        }
        
        function closeSettings() {
            playSound('click');
            document.getElementById('settingsPanel').style.display = 'none';
        }
        
        function switchPeriod(period) {
            currentPeriod = period;
            playSound('click');
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.period === period) btn.classList.add('active');
            });
            renderFoodList();
            updatePeriodBadge();
            currentFood = foods[currentPeriod][0];
            updateDisplay();
        }
        
        function renderFoodList() {
            const list = document.getElementById('foodList');
            list.innerHTML = '';
            foods[currentPeriod].forEach((food, index) => {
                const item = document.createElement('div');
                item.className = 'food-item';
                item.innerHTML = `
                    <div class="food-item-info">
                        <span style="font-size: 20px;">${food.emoji}</span>
                        <span>${food.name}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteFood(${index})">删除</button>
                `;
                list.appendChild(item);
            });
        }
        
        function addFood() {
            const input = document.getElementById('newFoodInput');
            const name = input.value.trim();
            if (!name) return;
            
            const emojis = ['🍜', '🍱', '🥟', '🍛', '🥗', '🍔', '🍕', '🥘', '🍝', '🍚', '🥡', '🌯', '🍲', '🥙', '🍣', '🥪', '🍖', '🦐', '🥩', '🍗', '🍢', '🥚', '🌮', '🥯', '🍙', '🍞', '🍰', '🥣', '🥛', '🥞', '🍳', '🥪'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            foods[currentPeriod].push({ emoji, name });
            saveFoods();
            renderFoodList();
            input.value = '';
            playSound('click');
        }
        
        function deleteFood(index) {
            if (foods[currentPeriod].length <= 1) {
                alert('至少保留一个食物选项！');
                return;
            }
            foods[currentPeriod].splice(index, 1);
            saveFoods();
            renderFoodList();
            playSound('click');
        }
        
        function saveFoods() {
            localStorage.setItem('pixelFoods', JSON.stringify(foods));
        }
        
        init();
    </script>
</body>
</html>
